<svg viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg" width="900" height="440">
  <defs>
    <style>
      .mono { font-family: "JetBrains Mono", "Fira Code", "Menlo", "Consolas", monospace; }
      .bold { font-weight: 700; }
    </style>
  </defs>
  <rect width="900" height="440" fill="#1a1b26" />
  <!-- Shell prompt -->
  <text x="30" y="28" class="mono" fill="#c0caf5" font-size="16" font-weight="600"><tspan fill="#7aa2f7" class="bold">❯</tspan><tspan fill="#bb9af7" xml:space="preserve"> ~/ </tspan><tspan>vim skills.json</tspan></text>
  <!-- Vim line numbers + JSON content -->
  <text x="52" y="58" class="mono" fill="#565f89" font-size="14" text-anchor="end">1</text>
  <text x="60" y="58" class="mono" font-size="14"><tspan fill="#565f89">{</tspan></text>
  <text x="52" y="80" class="mono" fill="#565f89" font-size="14" text-anchor="end">2</text>
  <text x="70" y="80" class="mono" font-size="14"><tspan fill="#7aa2f7" font-weight="600">"Languages"</tspan><tspan fill="#565f89">: [</tspan><tspan fill="#9ece6a">"C", "C++", "Python", "PHP", "JavaScript", "TypeScript"</tspan><tspan fill="#565f89">],</tspan></text>
  <text x="52" y="102" class="mono" fill="#565f89" font-size="14" text-anchor="end">3</text>
  <text x="70" y="102" class="mono" font-size="14"><tspan fill="#7aa2f7" font-weight="600">"Frontend"</tspan><tspan fill="#565f89"> : [</tspan><tspan fill="#9ece6a">"React", "Next.js", "HTML5", "CSS3", "Tailwind CSS"</tspan><tspan fill="#565f89">],</tspan></text>
  <text x="52" y="124" class="mono" fill="#565f89" font-size="14" text-anchor="end">4</text>
  <text x="70" y="124" class="mono" font-size="14"><tspan fill="#7aa2f7" font-weight="600">"Backend"</tspan><tspan fill="#565f89">  : [</tspan><tspan fill="#9ece6a">"Django", "FastAPI", "Node.js"</tspan><tspan fill="#565f89">],</tspan></text>
  <text x="52" y="146" class="mono" fill="#565f89" font-size="14" text-anchor="end">5</text>
  <text x="70" y="146" class="mono" font-size="14"><tspan fill="#7aa2f7" font-weight="600">"Database"</tspan><tspan fill="#565f89"> : [</tspan><tspan fill="#9ece6a">"PostgreSQL", "Redis"</tspan><tspan fill="#565f89">],</tspan></text>
  <text x="52" y="168" class="mono" fill="#565f89" font-size="14" text-anchor="end">6</text>
  <text x="70" y="168" class="mono" font-size="14"><tspan fill="#7aa2f7" font-weight="600">"Tools"</tspan><tspan fill="#565f89">    : [</tspan><tspan fill="#9ece6a">"Git", "Docker", "Linux", "Kubernetes", "ArgoCD", "GCloud", "Postman"</tspan><tspan fill="#565f89">]</tspan></text>
  <text x="52" y="190" class="mono" fill="#565f89" font-size="14" text-anchor="end">7</text>
  <text x="60" y="190" class="mono" font-size="14"><tspan fill="#565f89">}</tspan></text>
  <!-- Vim tildes -->
  <text x="30" y="212" class="mono" fill="#7aa2f7" font-size="14">~</text>
  <text x="30" y="234" class="mono" fill="#7aa2f7" font-size="14">~</text>
  <!-- Vim status bar -->
  <rect x="0" y="244" width="900" height="20" fill="#24283b" />
  <text x="10" y="258" class="mono" fill="#c0caf5" font-size="12">skills.json</text>
  <text x="890" y="258" class="mono" fill="#565f89" font-size="12" text-anchor="end">7L, 342B</text>
  <!-- Vim command line -->
  <text x="10" y="280" class="mono" fill="#c0caf5" font-size="14">:wq</text>
  
  <!-- Make Coffee -->
  <text x="30" y="315" class="mono" fill="#c0caf5" font-size="16" font-weight="600"><tspan fill="#7aa2f7" class="bold">❯</tspan><tspan fill="#bb9af7" xml:space="preserve"> ~/ </tspan><tspan>make coffee</tspan></text>
  <text x="30" y="340" class="mono" fill="#f7768e" font-size="14">make: *** No rule to make target 'coffee'. Stop.</text>
  
  <!-- GCC -->
  <text x="30" y="375" class="mono" fill="#c0caf5" font-size="16" font-weight="600"><tspan fill="#7aa2f7" class="bold">❯</tspan><tspan fill="#bb9af7" xml:space="preserve"> ~/ </tspan><tspan>gcc -Wall -Wextra -Werror snake.c</tspan></text>

  <!-- Run -->
  <text x="30" y="410" class="mono" fill="#c0caf5" font-size="16" font-weight="600"><tspan fill="#7aa2f7" class="bold">❯</tspan><tspan fill="#bb9af7" xml:space="preserve"> ~/ </tspan><tspan>./a.out</tspan></text>
  <path d="M 0.5 0 L 0.5 440 M 899.5 0 L 899.5 440" fill="none" stroke="#565f89" stroke-opacity="0.3" stroke-width="1" />
</svg>
